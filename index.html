const levenshteinDistance = (a, b) => {
    if (a.length === 0) return b.length;
    if (b.length === 0) return a.length;
    const matrix = Array(b.length + 1).fill().map(() => Array(a.length + 1).fill(0));
    for (let i = 0; i <= b.length; i++) matrix[i][0] = i;
    for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
    for (let i = 1; i <= b.length; i++) {
        for (let j = 1; j <= a.length; j++) {
            const cost = b[i-1] === a[j-1] ? 0 : 1;
            matrix[i][j] = Math.min(matrix[i-1][j] + 1, matrix[i][j-1] + 1, matrix[i-1][j-1] + cost);
        }
    }
    return matrix[b.length][a.length];
};

// ==================== COMPONENTE PRINCIPAL ====================
function App() {
    const [activeTab, setActiveTab] = React.useState('historia');
    const [guionData, setGuionData] = React.useState(DEFAULT_GUION);
    const [activeScriptTitle, setActiveScriptTitle] = React.useState("Lektion 17: Kunst");
    const [sceneIndex, setSceneIndex] = React.useState(0);
    const [mode, setMode] = React.useState('dialogue');
    const [isPlaying, setIsPlaying] = React.useState(false);
    const [voicesLoaded, setVoicesLoaded] = React.useState(false);
    const [playbackRate, setPlaybackRate] = React.useState(1.0);
    const [blindMode, setBlindMode] = React.useState(false);
    const [lueckentextMode, setLueckentextMode] = React.useState(false);
    const [declinaMode, setDeclinaMode] = React.useState(false);
    const [tempusMode, setTempusMode] = React.useState(false);
    const [artikelSniperMode, setArtikelSniperMode] = React.useState(false);
    const [fluesternMode, setFluesternMode] = React.useState(false);
    const [roleplayChar, setRoleplayChar] = React.useState('none');
    const [podcastMode, setPodcastMode] = React.useState(false);
    const [showCurrentTranslation, setShowCurrentTranslation] = React.useState(false);
    const [diktatMode, setDiktatMode] = React.useState(false);
    const [diktatInput, setDiktatInput] = React.useState("");
    const [showDiktatResult, setShowDiktatResult] = React.useState(false);
    const [savedScripts, setSavedScripts] = React.useState([]);
    const [customVocabLessons, setCustomVocabLessons] = React.useState([]);
    const [vocabTitleInput, setVocabTitleInput] = React.useState("");
    const [vocabTextInput, setVocabTextInput] = React.useState("");
    const [userStats, setUserStats] = React.useState({
        username: "Estudiante", isPremium: true, xp: 0, streakDays: 1,
        lastPlayedDate: new Date().toISOString().split('T')[0],
        coins: 150, hearts: 5, diktatAttempts: 0, diktatCorrect: 0,
        pronunciationTotalScore: 0, pronunciationAttempts: 0,
        difficultVocab: [], normalVocab: [], difficultGrammar: [],
        failedDiktatScenes: [], activityLog: [40, 60, 45, 80, 55, 90, 75]
    });
    const [vocabReviewIndex, setVocabReviewIndex] = React.useState(0);
    const [showVocabTranslation, setShowVocabTranslation] = React.useState(false);
    const [currentVocabList, setCurrentVocabList] = React.useState([]);
    const [bxCategory, setBxCategory] = React.useState('mix');
    const [bxIndex, setBxIndex] = React.useState(0);
    const [bxCurrentList, setBxCurrentList] = React.useState([]);
    const [practiceActive, setPracticeActive] = React.useState(null);
    const [practiceIndex, setPracticeIndex] = React.useState(0);
    const [practiceShowTrans, setPracticeShowTrans] = React.useState(false);
    const [aiLevel, setAiLevel] = React.useState('B1');
    const [aiTheme, setAiTheme] = React.useState('Alltag');
    const [aiCustomWords, setAiCustomWords] = React.useState("");
    const [isGeneratingStory, setIsGeneratingStory] = React.useState(false);
    const [isReviewing, setIsReviewing] = React.useState(false);
    const [reviewIndexPointer, setReviewIndexPointer] = React.useState(0);
    const [puzzleMode, setPuzzleMode] = React.useState(false);
    const [puzzleWords, setPuzzleWords] = React.useState([]);
    const [puzzleAnswer, setPuzzleAnswer] = React.useState([]);
    const [showPuzzleResult, setShowPuzzleResult] = React.useState(false);
    const [isListening, setIsListening] = React.useState(false);
    const [spokenText, setSpokenText] = React.useState("");
    const [pronunciationScore, setPronunciationScore] = React.useState(null);
    const [grammarPolizeiMsg, setGrammarPolizeiMsg] = React.useState("");
    const [pronunciationFeedback, setPronunciationFeedback] = React.useState([]);
    const [newScriptTitle, setNewScriptTitle] = React.useState("");
    const [scriptInput, setScriptInput] = React.useState(`Lukas: Hallo Elena! (¡Hola Elena!) [der Tag - el día]\nElena: Ja, ich bin froh! (¡Sí, estoy contenta!) [froh - contento]`);
    const [showLoginModal, setShowLoginModal] = React.useState(false);
    const [tempUsername, setTempUsername] = React.useState("");
    const [showTutor, setShowTutor] = React.useState(false);
    const [tutorMessage, setTutorMessage] = React.useState("");
    const [showDeathModal, setShowDeathModal] = React.useState(false);
    const [showGrammarPrompt, setShowGrammarPrompt] = React.useState(false);
    const [customGrammarInput, setCustomGrammarInput] = React.useState("");
    const [selectedLessonIds, setSelectedLessonIds] = React.useState([]);
    const [handwritingMode, setHandwritingMode] = React.useState(false);
    const [noiseEnabled, setNoiseEnabled] = React.useState(false);
    const [noiseSource, setNoiseSource] = React.useState(null);
    
    const isPlayingRef = React.useRef(false);
    const timeoutRef = React.useRef(null);
    const recognitionRef = React.useRef(null);
    const spokenTextRef = React.useRef("");

    React.useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, []);
    React.useEffect(() => {
        const saved = localStorage.getItem('mullerStats');
        if(saved) setUserStats(JSON.parse(saved));
        else setShowLoginModal(true);
        const scripts = localStorage.getItem('mullerScripts');
        if(scripts) setSavedScripts(JSON.parse(scripts));
        const vocab = localStorage.getItem('mullerCustomVocab');
        if(vocab) setCustomVocabLessons(JSON.parse(vocab));
        const handleVoices = () => setVoicesLoaded(true);
        window.speechSynthesis.addEventListener('voiceschanged', handleVoices);
        if(window.speechSynthesis.getVoices().length) setVoicesLoaded(true);
        return () => window.speechSynthesis.removeEventListener('voiceschanged', handleVoices);
    }, []);
    React.useEffect(() => { isPlayingRef.current = isPlaying; }, [isPlaying]);
    React.useEffect(() => {
        if(activeTab !== 'vocabulario') {
            const all = [];
            guionData.forEach(scene => scene.vocab?.forEach(v => { if(!all.some(e=>e.de===v.de)) all.push(v); }));
            setCurrentVocabList(all);
            setVocabReviewIndex(0);
            setShowVocabTranslation(false);
        }
    }, [guionData, activeTab]);

    const saveProgress = (updates) => {
        const merged = { ...userStats, ...updates, lastPlayedDate: new Date().toISOString().split('T')[0] };
        setUserStats(merged);
        localStorage.setItem('mullerStats', JSON.stringify(merged));
    };
    const deductHeart = () => {
        if(userStats.hearts <= 1) { saveProgress({ hearts: 0 }); stopAudio(); setShowDeathModal(true); }
        else saveProgress({ hearts: userStats.hearts - 1 });
    };
    const buyHearts = () => {
        if(userStats.coins >= 50) { saveProgress({ coins: userStats.coins - 50, hearts: 5 }); setShowDeathModal(false); }
        else alert("No tienes suficientes monedas.");
    };
    const stopAudio = () => { window.speechSynthesis.cancel(); if(timeoutRef.current) clearTimeout(timeoutRef.current); setIsPlaying(false); if(noiseSource) { noiseSource.stop(); setNoiseSource(null); } };
    const getActualSceneIndex = () => isReviewing ? userStats.failedDiktatScenes[reviewIndexPointer] : sceneIndex;
    const proceedToNextStage = () => {
        if(isReviewing) {
            if(reviewIndexPointer < userStats.failedDiktatScenes.length - 1) { setReviewIndexPointer(p=>p+1); setMode('dialogue'); resetModes(); }
            else { saveProgress({ failedDiktatScenes: [] }); setIsReviewing(false); stopAudio(); }
        } else {
            if(sceneIndex < guionData.length - 1) { setSceneIndex(s=>s+1); setMode('dialogue'); resetModes(); }
            else {
                if(userStats.failedDiktatScenes.length) { alert("Historia terminada. Repaso de fallos."); setIsReviewing(true); setReviewIndexPointer(0); setMode('dialogue'); resetModes(); }
                else { stopAudio(); alert("¡Completaste el guion!"); }
            }
        }
    };
    const resetModes = () => { setDiktatInput(""); setShowDiktatResult(false); setSpokenText(""); setPronunciationScore(null); setGrammarPolizeiMsg(""); setPronunciationFeedback([]); setShowPuzzleResult(false); setShowCurrentTranslation(false); if(puzzleMode) initPuzzle(guionData[getActualSceneIndex()]?.text); };
    const handleNext = () => { stopAudio(); proceedToNextStage(); };
    const handlePrev = () => { stopAudio(); if(!isReviewing && sceneIndex>0) { setSceneIndex(s=>s-1); setMode('dialogue'); resetModes(); } };
    const togglePlay = () => { if(userStats.hearts<=0) setShowDeathModal(true); else if(isPlaying) stopAudio(); else setIsPlaying(true); };
    const initPuzzle = (text) => { if(!text) return; const words = text.split(/\s+/).map((w,i)=>({id:i, text:w})); setPuzzleWords(words.sort(()=>Math.random()-0.5)); setPuzzleAnswer([]); };
    React.useEffect(() => { if(puzzleMode && activeTab==='historia') initPuzzle(guionData[getActualSceneIndex()]?.text); }, [sceneIndex, isReviewing, puzzleMode, guionData, activeTab]);

    const playSceneAudio = (text, speaker) => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'de-DE';
        const voices = window.speechSynthesis.getVoices();
        const getVoice = (gender) => voices.find(v=>v.lang.startsWith('de') && (gender==='female'?/female|Katja/i.test(v.name):/male|Stefan/i.test(v.name))) || voices[0];
        if(speaker === 'Lukas') utterance.voice = getVoice('male');
        else if(speaker === 'Elena' || speaker === 'Anna') utterance.voice = getVoice('female');
        else if(speaker.includes('Weber')) utterance.voice = getVoice('male');
        utterance.rate = (speaker.includes('Weber')?0.9:1.0)*playbackRate;
        if(fluesternMode) utterance.volume = 0.3;
        if(noiseEnabled && !noiseSource) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const gain = ctx.createGain();
                gain.gain.value = 0.15;
                const bufferSize = 4096;
                const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for(let i=0; i<bufferSize; i++) output[i] = Math.random() * 2 - 1;
                const src = ctx.createBufferSource();
                src.buffer = noiseBuffer;
                src.loop = true;
                src.connect(gain);
                gain.connect(ctx.destination);
                src.start();
                setNoiseSource(src);
            } catch(e) { console.warn("Ruido no soportado"); }
        }
        utterance.onend = () => {
            if(noiseSource) { noiseSource.stop(); setNoiseSource(null); }
            if(isPlayingRef.current) {
                if(diktatMode || puzzleMode || declinaMode || artikelSniperMode) { setIsPlaying(false); return; }
                timeoutRef.current = setTimeout(() => proceedToNextStage(), podcastMode?1500:800);
            }
        };
        window.speechSynthesis.speak(utterance);
        return utterance;
    };

    const handleSaveCustomVocab = () => {
        if(!vocabTitleInput.trim()) { alert("Título requerido"); return; }
        if(!vocabTextInput.trim()) { alert("Pega vocabulario"); return; }
        const lines = vocabTextInput.split(/\r?\n/);
        const parsed = [];
        const clean = (s) => s.replace(/[\x00-\x1F\x7F-\x9F\u200B-\u200D\uFEFF]/g,'').replace(/[\u{1F000}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\u{2B50}]|\u{FE0F}|[🔵🔴🟢⚡🏛️🗳️✍️🌀]/gu,'').trim();
        lines.forEach(line => {
            let l = line.replace(/^[🗳️🏛️⚡✍️🌀]*/, '').trim();
            let isDiff = false;
            if(l.startsWith('1')) { isDiff = true; l = l.replace(/^1[.\-):\]]*\s*/, ''); }
            l = l.replace(/^[-*•+>]\s*/, '').replace(/^\d+[.\-):\]]+\s*/, '');
            let de = '', es = '';
            const sep = l.match(/(\s+-\s+|\s+=\s+|\t|\s{2,})/);
            if(sep) {
                const idx = l.indexOf(sep[0]);
                de = clean(l.substring(0, idx));
                es = clean(l.substring(idx+sep[0].length));
            } else {
                const parts = l.split(/\s+/);
                let split = 1;
                if(parts.length>2 && /^(der|die|das|sich)$/i.test(parts[0])) split = 2;
                de = clean(parts.slice(0,split).join(' '));
                es = clean(parts.slice(split).join(' '));
                if(!es) es = "???";
            }
            de = de.replace(/^1[.\-):\]]*\s*/, '');
            if(de) parsed.push({ de, es, diff: isDiff?1:0 });
        });
        if(parsed.length) {
            const newLesson = { id: Date.now()+'-'+Math.random(), title: vocabTitleInput, words: parsed };
            const updated = [...customVocabLessons, newLesson];
            setCustomVocabLessons(updated);
            localStorage.setItem('mullerCustomVocab', JSON.stringify(updated));
            setVocabTitleInput(""); setVocabTextInput("");
            alert(`Guardado: ${parsed.length} palabras`);
        } else alert("No se pudo parsear el vocabulario.");
    };

    const handleSaveScript = () => {
        if(!newScriptTitle.trim()) { alert("Título"); return; }
        try {
            const lines = scriptInput.split('\n');
            const newGuion = [];
            lines.forEach(line => {
                if(!line.trim()) return;
                const match = line.match(/^([\w\s]+):/);
                if(!match) return;
                const speaker = match[1].trim();
                let rest = line.substring(match[0].length).trim();
                let vocab = [];
                const vbMatch = rest.match(/\[(.*?)\]$/);
                if(vbMatch) {
                    rest = rest.replace(/\[(.*?)\]$/, '').trim();
                    vbMatch[1].split(',').forEach(pair => {
                        const parts = pair.split('-');
                        if(parts.length>=2) vocab.push({ de: parts[0].trim(), es: parts[1].trim(), diff:1 });
                    });
                }
                let isRedemittel = false;
                if(rest.endsWith('[R]')) { isRedemittel=true; rest=rest.replace('[R]','').trim(); }
                let translation = "Traducción no proporcionada";
                const trMatch = rest.match(/\((.*?)\)$/);
                if(trMatch) { translation=trMatch[1].trim(); rest=rest.replace(/\((.*?)\)$/,'').trim(); }
                newGuion.push({ speaker, text: rest, translation, isRedemittel, vocab });
            });
            if(!newGuion.length) throw new Error();
            const scriptObj = { id: Date.now(), title: newScriptTitle, data: JSON.stringify(newGuion) };
            const updated = [...savedScripts, scriptObj].sort((a,b)=>a.title.localeCompare(b.title));
            setSavedScripts(updated);
            localStorage.setItem('mullerScripts', JSON.stringify(updated));
            setGuionData(newGuion); setActiveScriptTitle(newScriptTitle); setSceneIndex(0); setMode('dialogue'); stopAudio(); resetModes(); setIsReviewing(false);
            setNewScriptTitle(""); setActiveTab('historia');
        } catch(e) { alert("Formato incorrecto."); }
    };
    const loadSavedScript = (script) => {
        setGuionData(JSON.parse(script.data)); setActiveScriptTitle(script.title); setSceneIndex(0); setMode('dialogue'); stopAudio(); resetModes(); setIsReviewing(false); setActiveTab('historia');
    };

    const playVocabAudio = () => {
        if(!currentVocabList.length) return;
        window.speechSynthesis.cancel();
        const w = currentVocabList[vocabReviewIndex];

    const HandwritingPad = ({ onClose, onSave }) => {
        const canvasRef = React.useRef(null);
        const drawingRef = React.useRef(false);
        React.useEffect(() => {
            const canvas = canvasRef.current;
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            const draw = (e) => {
                if(!drawingRef.current) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let clientX, clientY;
                if(e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
                else { clientX = e.clientX; clientY = e.clientY; }
                const x = (clientX - rect.left) * scaleX;
                const y = (clientY - rect.top) * scaleY;
                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            };
            const start = (e) => {
                drawingRef.current = true;
                ctx.beginPath();
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                let clientX, clientY;
                if(e.touches) { clientX=e.touches[0].clientX; clientY=e.touches[0].clientY; }
                else { clientX=e.clientX; clientY=e.clientY; }
                const x = (clientX - rect.left)*scaleX;
                const y = (clientY - rect.top)*scaleY;
                ctx.moveTo(x, y);
                e.preventDefault();
            };
            const end = () => { drawingRef.current = false; ctx.beginPath(); };
            canvas.addEventListener('pointerdown', start);
            canvas.addEventListener('pointermove', draw);
            canvas.addEventListener('pointerup', end);
            canvas.addEventListener('touchstart', start);
            canvas.addEventListener('touchmove', draw);
            canvas.addEventListener('touchend', end);
            return () => {
                canvas.removeEventListener('pointerdown', start);
                canvas.removeEventListener('pointermove', draw);
                canvas.removeEventListener('pointerup', end);
            };
        }, []);
        const clearCanvas = () => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0,0,canvas.width,canvas.height);
        };
        const saveImage = () => { onSave(canvasRef.current.toDataURL()); };
        return (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
                <div className="bg-gray-900 rounded-2xl p-4 max-w-2xl w-full">
                    <h3 className="text-white font-bold mb-2">✍️ Escribe a mano</h3>
                    <canvas ref={canvasRef} width={600} height={300} className="handwriting-canvas border-2 border-blue-500 rounded-xl bg-white"></canvas>
                    <div className="flex gap-3 mt-4">
                        <button onClick={clearCanvas} className="bg-red-600 px-4 py-2 rounded-lg">Borrar</button>
                        <button onClick={saveImage} className="bg-green-600 px-4 py-2 rounded-lg">Usar dibujo</button>
                        <button onClick={onClose} className="bg-gray-600 px-4 py-2 rounded-lg">Cancelar</button>
                    </div>
                </div>
            </div>
        );
    };

        if(vocabList?.length) {
            const sorted = [...vocabList].sort((a,b)=>b.de.length - a.de.length);
            sorted.forEach(v => {
                const search = v.de.replace(/^(der|die|das|sich)\s/i,'').trim().replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
                const regex = new RegExp(`(?![^<]*>)(^|[^a-zäöüßA-ZÄÖÜẞ])(${search})([^a-zäöüßA-ZÄÖÜẞ]|$)`, 'gi');
                if(lueckentextMode) html = html.replace(regex, `$1<span class="bg-gray-800 text-transparent border-b border-yellow-500/70 px-2 mx-0.5 select-none">[???]</span>$3`);

            });
        }
        GRAMMAR_PATTERNS.forEach(p => { html = html.replace(p.regex, `<span class="bg-cyan-800/40 text-cyan-200 border-b border-cyan-400/60 px-1 rounded-sm" title="${p.tooltip}">$1</span>`); });
        if(tempusMode) {
            Object.keys(TEMPUS_DICT).forEach(v => {
                const re = new RegExp(`\\b(${v})\\b`,'gi');
                html = html.replace(re, `$1 <span class="text-blue-200 text-[10px] bg-blue-800/50 border border-blue-500/50 px-1 rounded">(${TEMPUS_DICT[v]})</span>`);

        }

        const akkRe = new RegExp(`\\b(${PREP_AKK.join('|')})\\b`,'gi');

        const wechRe = new RegExp(`\\b(${PREP_WECHSEL.join('|')})\\b`,'gi');
        html = html.replace(wechRe, `<span class="text-yellow-500/90 underline decoration-yellow-600/70">$1</span>`);
        return <div className="leading-loose" dangerouslySetInnerHTML={{ __html: html }} />;
    };

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="bg-gray-900 p-4 rounded-2xl border border-red-900/50"><h2 className="font-bold text-red-500">Vocabulario Difícil</h2><ul className="max-h-40 overflow-y-auto text-sm mt-2">{userStats.difficultVocab.map((v,i)=><li key={i}>{v.de} - {v.es}</li>)}</ul><button onClick={()=>startPractice('diff')} className="mt-3 bg-red-600 w-full py-1 rounded">Practicar</button></div>
                            <div className="bg-gray-900 p-4 rounded-2xl border border-blue-900/50"><h2 className="font-bold text-blue-400">Vocabulario Normal</h2><ul className="max-h-40 overflow-y-auto text-sm mt-2">{userStats.normalVocab.map((v,i)=><li key={i}>{v.de} - {v.es}</li>)}</ul><button onClick={()=>startPractice('norm')} className="mt-3 bg-blue-600 w-full py-1 rounded">Practicar</button></div>
                            <div className="bg-gray-900 p-4 rounded-2xl border border-cyan-900/50"><h2 className="font-bold text-cyan-400">Gramática</h2><ul className="max-h-40 overflow-y-auto text-sm mt-2">{userStats.difficultGrammar.map((g,i)=><li key={i}>{g.base}</li>)}</ul><button onClick={()=>startPractice('grammar')} className="mt-3 bg-cyan-600 w-full py-1 rounded">Practicar</button></div>
                        </div>
                    </div>
                )}
                {activeTab === 'guiones' && !practiceActive && (
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row gap-6">
                        <div className="flex-[2] bg-gray-800/50 p-4 rounded-2xl">
                            <h2 className="text-xl font-bold text-purple-400">Añadir Guion</h2>
                            <input type="text" placeholder="Título" className="w-full bg-black/50 p-2 rounded mt-2" value={newScriptTitle} onChange={e=>setNewScriptTitle(e.target.value)}/>
                            <textarea rows="6" className="w-full bg-black/50 p-2 rounded mt-2 font-mono text-sm" value={scriptInput} onChange={e=>setScriptInput(e.target.value)}></textarea>
                            <button onClick={handleSaveScript} className="mt-3 bg-purple-600 w-full py-2 rounded">Guardar</button>
                        </div>
                        <div className="flex-1 bg-amber-900/20 p-4 rounded-2xl border border-amber-800/50">
                            <h2 className="text-xl font-bold text-amber-400">Lecciones</h2>
                            <div className="flex gap-2 mt-2">
                                <input type="text" placeholder="Título" className="bg-black/50 p-1 rounded text-sm flex-1" value={vocabTitleInput} onChange={e=>setVocabTitleInput(e.target.value)}/>
                                <button onClick={handleSaveCustomVocab} className="bg-amber-600 px-3 py-1 rounded text-sm">Guardar</button>
                            </div>
                            <textarea rows="3" placeholder="Pega lista (palabra - traducción)" className="w-full bg-black/50 p-2 rounded mt-2 text-sm" value={vocabTextInput} onChange={e=>setVocabTextInput(e.target.value)}></textarea>
                            <div className="mt-4 max-h-80 overflow-y-auto space-y-2">
                                {customVocabLessons.map(lesson => (
                                    <div key={lesson.id} className="bg-black/40 p-2 rounded flex justify-between items-center">
                                        <div><span className="font-bold">{lesson.title}</span> ({lesson.words.length})</div>
                                        <button onClick={()=>{setCurrentVocabList(lesson.words); setActiveScriptTitle(lesson.title); setVocabReviewIndex(0); setShowVocabTranslation(false); setActiveTab('vocabulario');}} className="bg-amber-600 px-2 py-0.5 rounded text-xs">Tarjetas</button>
                                    </div>
                                ))}
                            </div>
                            {customVocabLessons.length>0 && (
                                <div className="mt-4 border-t border-amber-800/50 pt-3">
                                    <p className="text-sm font-bold">Mezclar:</p>
                                    <div className="flex flex-wrap gap-2 mt-1">
                                        {customVocabLessons.map(l=> <label key={l.id} className="flex items-center gap-1 text-xs"><input type="checkbox" onChange={e=>{if(e.target.checked) setSelectedLessonIds([...selectedLessonIds, l.id]); else setSelectedLessonIds(selectedLessonIds.filter(id=>id!==l.id))}}/>{l.title}</label>)}
                                    </div>
                                    <button onClick={()=>{let all=[]; selectedLessonIds.forEach(id=>{const les=customVocabLessons.find(l=>l.id===id); if(les) all.push(...les.words);}); if(!all.length) return; for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];} const diff=all.filter(w=>w.diff===1); setCurrentVocabList([...all,...diff]); setActiveScriptTitle("Mezcla"); setVocabReviewIndex(0); setShowVocabTranslation(false); setActiveTab('vocabulario');}} className="mt-2 w-full bg-purple-600 py-1 rounded text-sm">Practicar mezcla</button>
                                </div>
                            )}
                        </div>
                    </div>
                )}
                {activeTab === 'vocabulario' && !practiceActive && (
                    <div className="flex flex-col items-center justify-center min-h-[60vh]">
                        {currentVocabList.length===0 ? <p>No hay vocabulario.</p> : (
                            <div className="max-w-2xl w-full text-center">
                                <button onClick={playVocabAudio} className="bg-white/20 p-4 rounded-full mb-6"><Icon name="volume-2" size={32}/></button>
                                <h1 className="text-6xl font-bold">{getArticleVisual(currentVocabList[vocabReviewIndex].de)}{currentVocabList[vocabReviewIndex].de}</h1>
                                {!showVocabTranslation ? (
                                    <div className="flex gap-4 justify-center mt-8">
                                        <button onClick={()=>setShowVocabTranslation(true)} className="bg-slate-800 px-8 py-3 rounded-xl">Revelar</button>
                                        <button onClick={()=>setShowHandwriting(true)} className="bg-blue-600 px-8 py-3 rounded-xl flex gap-2"><Icon name="pen-tool"/> Escribir</button>
                                    </div>
                                ) : (
                                    <div className="mt-8"><h2 className="text-3xl text-green-300">{currentVocabList[vocabReviewIndex].es}</h2>
                                    <div className="flex gap-4 mt-6"><button onClick={()=>handleVocabDifficulty('easy')} className="bg-green-600 px-4 py-2 rounded">Fácil</button><button onClick={()=>handleVocabDifficulty('normal')} className="bg-blue-600 px-4 py-2 rounded">Normal</button><button onClick={()=>handleVocabDifficulty('hard')} className="bg-red-600 px-4 py-2 rounded">Difícil</button></div></div>
                                )}
                            </div>
                        )}
                    </div>
                )}
                {activeTab === 'historia' && !practiceActive && (
                    <div className="max-w-4xl mx-auto relative">
                        <div className="bg-black/40 p-6 rounded-2xl">
                            <div className="text-sm text-gray-400">{guionData[getActualSceneIndex()].speaker}</div>
                            <div className="text-3xl md:text-5xl font-medium mt-2">{renderHighlightedText(guionData[getActualSceneIndex()].text, guionData[getActualSceneIndex()].vocab)}</div>
                            {!showCurrentTranslation && <button onClick={()=>setShowCurrentTranslation(true)} className="mt-4 text-gray-500 text-sm">Ver traducción</button>}
                            {showCurrentTranslation && <div className="mt-2 italic text-gray-300">"{guionData[getActualSceneIndex()].translation}"</div>}
                            <div className="flex gap-2 mt-6 flex-wrap">
                                <button onClick={()=>setBlindMode(!blindMode)} className="bg-gray-700 px-3 py-1 rounded text-xs">Oído</button>
                                <button onClick={()=>setLueckentextMode(!lueckentextMode)} className="bg-gray-700 px-3 py-1 rounded text-xs">Huecos</button>
                                <button onClick={()=>setDeclinaMode(!declinaMode)} className="bg-gray-700 px-3 py-1 rounded text-xs">Declinar</button>
                                <button onClick={()=>setTempusMode(!tempusMode)} className="bg-gray-700 px-3 py-1 rounded text-xs">Tempus</button>
                                <button onClick={()=>setArtikelSniperMode(!artikelSniperMode)} className="bg-gray-700 px-3 py-1 rounded text-xs">Artículos</button>
                                <button onClick={()=>{setDiktatMode(!diktatMode); setPuzzleMode(false); resetModes();}} className="bg-red-800 px-3 py-1 rounded text-xs">Diktat</button>
                                <button onClick={()=>{setPuzzleMode(!puzzleMode); setDiktatMode(false); resetModes();}} className="bg-indigo-800 px-3 py-1 rounded text-xs">Satzbau</button>
                                <button onClick={showAITutor} className="bg-blue-600 px-3 py-1 rounded text-xs">Tutor</button>
                                <button onClick={trySaveGrammarStructure} className="bg-cyan-600 px-3 py-1 rounded text-xs">Guardar</button>
                            </div>
                        </div>
                        {diktatMode && mode==='dialogue' && (
                            <div className="mt-4 bg-black/40 p-4 rounded">
                                <p>Escribe lo que oyes:</p>
                                <textarea className="w-full bg-black/50 p-2 rounded" rows="3" value={diktatInput} onChange={e=>setDiktatInput(e.target.value)}></textarea>
                                <button onClick={()=>{setShowDiktatResult(true); if(diktatInput.toLowerCase().replace(/[.,!?]/g,'') !== guionData[getActualSceneIndex()].text.toLowerCase().replace(/[.,!?]/g,'')) deductHeart(); else saveProgress({coins: userStats.coins+5});}} className="bg-green-600 px-4 py-2 rounded mt-2">Corregir</button>
                                {showDiktatResult && <div className="mt-2 p-2 bg-gray-900 rounded">{guionData[getActualSceneIndex()].text}</div>}
                            </div>
                        )}
                        {puzzleMode && mode==='dialogue' && (
                            <div className="mt-4 bg-black/40 p-4 rounded">
                                <div className="flex flex-wrap gap-2 mb-2 p-2 border border-dashed">{puzzleAnswer.map(pw=><button key={pw.id} onClick={()=>{setPuzzleAnswer(puzzleAnswer.filter(w=>w.id!==pw.id)); setPuzzleWords([...puzzleWords, pw]);}} className="bg-indigo-600 px-2 py-1 rounded">{pw.text}</button>)}</div>
                                <div className="flex flex-wrap gap-2">{puzzleWords.map(pw=><button key={pw.id} onClick={()=>{setPuzzleWords(puzzleWords.filter(w=>w.id!==pw.id)); setPuzzleAnswer([...puzzleAnswer, pw]);}} className="bg-gray-700 px-2 py-1 rounded">{pw.text}</button>)}</div>
                                <button onClick={()=>setShowPuzzleResult(true)} disabled={puzzleWords.length>0} className="mt-2 bg-green-600 px-4 py-1 rounded">Comprobar</button>
                                {showPuzzleResult && <div className="mt-2 text-green-300">{guionData[getActualSceneIndex()].text}</div>}
                            </div>
                        )}
                    </div>
                )}
                {practiceActive && (
                    <div className="flex flex-col items-center justify-center h-full">
                        <div className="bg-black/60 p-8 rounded-3xl max-w-2xl w-full text-center">
                            <button onClick={()=>playPracticeAudio(practiceActive==='grammar'?userStats.difficultGrammar[practiceIndex]?.base:userStats[practiceActive==='diff'?'difficultVocab':'normalVocab'][practiceIndex]?.de)} className="bg-white/10 p-4 rounded-full mb-4"><Icon name="volume-2"/></button>
                            <h1 className="text-5xl font-bold">{practiceActive==='grammar'?userStats.difficultGrammar[practiceIndex]?.base:userStats[practiceActive==='diff'?'difficultVocab':'normalVocab'][practiceIndex]?.de}</h1>
                            {!practiceShowTrans ? <button onClick={()=>setPracticeShowTrans(true)} className="mt-6 bg-blue-600 px-6 py-2 rounded-xl">Revelar</button> : (
                                <div><p className="text-2xl text-green-300 mt-4">{practiceActive==='grammar'?userStats.difficultGrammar[practiceIndex]?.exampleEs:userStats[practiceActive==='diff'?'difficultVocab':'normalVocab'][practiceIndex]?.es}</p><button onClick={nextPracticeWord} className="mt-6 bg-green-600 px-6 py-2 rounded-xl">Siguiente</button></div>
                            )}
                        </div>
                    </div>
                )}
            </div>

            {/* Controles de reproducción */}
            {activeTab === 'historia' && !practiceActive && (
                <div className="bg-gray-950 p-3 flex justify-between items-center border-t border-gray-800">
                    <button onClick={handlePrev} disabled={podcastMode} className="p-2 rounded-full bg-gray-800"><Icon name="skip-back"/></button>
                    <button onClick={togglePlay} className={`p-4 rounded-full ${isPlaying?'bg-red-600':'bg-blue-600'}`}>{isPlaying?<Icon name="square"/>:<Icon name="play"/>}</button>
                    <button onClick={handleNext} disabled={podcastMode} className="p-2 rounded-full bg-gray-800"><Icon name="skip-forward"/></button>
                    <div className="flex items-center gap-2"><Icon name="sliders"/><input type="range" min="0.5" max="1.5" step="0.01" value={playbackRate} onChange={e=>setPlaybackRate(parseFloat(e.target.value))}/><span className="text-xs">{playbackRate}x</span></div>
                </div>
            )}

            {/* Modales */}
            {showLoginModal && (
                <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
                    <div className="bg-gray-900 p-8 rounded-2xl text-center">
                        <Icon name="crown" className="w-16 h-16 text-amber-500 mx-auto"/>
                        <input type="text" placeholder="Nombre" className="bg-black/50 p-3 rounded mt-4 w-full" value={tempUsername} onChange={e=>setTempUsername(e.target.value)}/>
                        <button onClick={()=>{if(tempUsername.trim()){saveProgress({username:tempUsername}); setShowLoginModal(false);}}} className="mt-4 bg-amber-600 px-6 py-2 rounded w-full">Empezar</button>
                    </div>
                </div>
            )}
            {showDeathModal && (
                <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
                    <div className="bg-gray-900 p-8 rounded-2xl text-center">
                        <Icon name="heart" className="w-16 h-16 text-red-500 mx-auto"/>
                        <h2 className="text-2xl font-bold mt-2">Sin vidas</h2>
                        <button onClick={buyHearts} className="mt-4 bg-yellow-500 px-6 py-2 rounded">Comprar 5 ❤️ (50 coins)</button>
                    </div>
                </div>
            )}
            {showTutor && (
                <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
                    <div className="bg-gray-900 p-6 rounded-2xl max-w-2xl w-full">
                        <h2 className="text-2xl font-bold text-blue-400">Tutor IA</h2>
                        <p className="mt-4 whitespace-pre-wrap">{tutorMessage}</p>
                        <button onClick={()=>setShowTutor(false)} className="mt-6 bg-blue-600 w-full py-2 rounded">Cerrar</button>
                    </div>
                </div>
            )}
            {showGrammarPrompt && (
                <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-4">
                    <div className="bg-gray-900 p-6 rounded-2xl w-full max-w-md">
                        <h2 className="text-xl font-bold">Guardar gramática</h2>
                        <input type="text" placeholder="Ej: Nebensatz" className="w-full bg-black/50 p-2 rounded mt-2" value={customGrammarInput} onChange={e=>setCustomGrammarInput(e.target.value)}/>
                        <div className="flex gap-3 mt-4"><button onClick={()=>setShowGrammarPrompt(false)} className="flex-1 bg-gray-700 py-2 rounded">Cancelar</button><button onClick={handleCustomGrammarSave} className="flex-1 bg-cyan-600 py-2 rounded">Guardar</button></div>
                    </div>
                </div>
            )}
            {showHandwriting && <HandwritingPad onClose={()=>setShowHandwriting(false)} onSave={(data)=>{setShowHandwriting(false); alert("Dibujo guardado (puedes comparar visualmente)");}} />}
        </div>
    );
}

// Renderizar la app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
